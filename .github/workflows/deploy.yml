name: Deploy to VPS

on:
    push:
        branches:
            - main

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - uses: pnpm/action-setup@v4
              name: Install pnpm
              with:
                  run_install: false

            - name: Install Node.JS
              uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install

            - name: Build the app
              run: pnpm run build

            - name: Copy project to VPS
              uses: appleboy/scp-action@v1
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: root
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  source: ".next,public,package.json,next.config.js,pnpm-lock.yaml"
                  target: "~/apps/zeroshot-nextjs"

            - name: SSH and restart app
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: root
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  script: |
                      cd ~/apps/zeroshot-nextjs
                      # Install only production dependencies (respect lockfile for deterministic installs)
                      pnpm install --prod --frozen-lockfile
                      # Reload if the process exists, otherwise start a new one. This avoids spawning a second
                      # instance that would conflict on the same port.
                      if pm2 describe zeroshot-nextjs > /dev/null; then
                        pm2 reload zeroshot-nextjs --update-env
                      else
                        pm2 start pnpm --name zeroshot-nextjs -- start
                      fi
                      # Persist current process list (optional, helps after server reboot if pm2 resurrect is used)
                      pm2 save || true
